<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teslimenin Yapay Zekası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --chat-bg: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; background: var(--chat-bg); }
        header { padding: 15px 25px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 80%; }
        .user { background: var(--accent); align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #1e293b; border-top: 1px solid #334155; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        #file-label { background: #475569; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <h3>✨ Teslimenin Yapay Zekası</h3>
            <div class="controls">
                <button onclick="downloadLastAsPDF()" class="btn" title="Son Yanıtı PDF Yap"><i class="fas fa-file-pdf"></i></button>
                <button id="voice-toggle" class="btn"><i class="fas fa-volume-up"></i></button>
                <select id="model-select">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                </select>
            </div>
        </header>
        <div id="chat-box"></div>
        <div id="typing" style="display:none; padding:10px;">Yapay zeka dosyayı inceliyor...</div>
        <div id="input-area">
            <label id="file-label" for="file-input"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="file-input" style="display:none" accept=".pdf">
            <input type="text" id="user-input" placeholder="Dosya hakkında soru sor veya özetle de...">
            <button id="send-btn" class="btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
