<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teslimenin Yapay Zekası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --chat-bg: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; background: var(--chat-bg); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        header { padding: 15px 25px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; background: #1e293b; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { width: 35px; height: 35px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        select { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 8px; cursor: pointer; outline: none; }
        #clear-btn { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        #clear-btn:hover { background: #dc2626; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 80%; line-height: 1.6; font-size: 15.5px; word-wrap: break-word; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #475569; }
        #typing { font-size: 13px; color: #94a3b8; padding: 10px 25px; display: none; font-style: italic; }
        #input-area { padding: 20px; display: flex; gap: 12px; border-top: 1px solid #334155; background: #1e293b; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; font-size: 15px; }
        input:focus { border-color: var(--accent); }
        button#send-btn { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        button#send-btn:hover { background: #2563eb; transform: scale(1.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <div class="header-left">
                <div class="logo">✨</div>
                <h3 style="margin:0; font-weight: 600;">Teslimenin Yapay Zekası</h3>
            </div>
            <div class="controls">
                <button id="clear-btn" title="Sohbeti Temizle"><i class="fas fa-trash"></i></button>
                <select id="model-select">
                    <option value="gpt-4o">GPT-4o (Zeki)</option>
                    <option value="gpt-4o-mini" selected>GPT-4o Mini (Hızlı)</option>
                    <option value="o1-mini">o1-Mini (Kod)</option>
                </select>
            </div>
        </header>
        <div id="chat-box"></div>
        <div id="typing">Teslimen yanıt oluşturuyor...</div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
