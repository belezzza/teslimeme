<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teslimenin Yapay Zekası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --chat-bg: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; background: var(--chat-bg); }
        header { padding: 15px 25px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; background: #1e293b; }
        .controls { display: flex; gap: 10px; }
        .btn { background: #334155; color: white; border: 1px solid #475569; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn.active { border-color: var(--accent); color: var(--accent); }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 80%; line-height: 1.6; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #475569; }
        #typing { font-size: 13px; color: #94a3b8; padding: 10px 25px; display: none; }
        #input-area { padding: 20px; display: flex; gap: 12px; border-top: 1px solid #334155; background: #1e293b; }
        input[type="text"] { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #file-label { background: #475569; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; }
        select { background: #0f172a; color: white; border: 1px solid #475569; border-radius: 8px; padding: 5px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:30px; height:30px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center;">✨</div>
                <h3 style="margin:0;">Teslimen AI</h3>
            </div>
            <div class="controls">
                <button onclick="downloadLastAsPDF()" class="btn" title="Yanıtı PDF İndir"><i class="fas fa-file-pdf"></i></button>
                <button id="voice-toggle" class="btn active"><i class="fas fa-volume-up"></i></button>
                <select id="model-select">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                </select>
            </div>
        </header>
        <div id="chat-box"></div>
        <div id="typing">Yapay zeka dosyayı inceliyor...</div>
        <div id="input-area">
            <label id="file-label" for="file-input"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="file-input" style="display:none" accept=".pdf">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın veya PDF yükleyin..." autocomplete="off">
            <button id="send-btn" class="btn" style="background:var(--accent); border:none;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
